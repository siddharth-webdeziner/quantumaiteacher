<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="Quantum AI Teacher - An intelligent AI-powered teaching assistant that helps students learn with personalized responses and contextual understanding.">
  <meta name="keywords" content="AI Teacher, Quantum AI, Education, Learning Assistant">
  <meta name="author" content="Quantum AI Team">
  <meta name="theme-color" content="#6366f1">
  <title>Quantum AI Teacher</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

</head>
<body>

<div class="header">
  <h1><img src="./logo.png" alt="Quantum AI Teacher" style="height: 60px; margin-right: 15px;"> Quantum AI Teacher</h1>
  <p>Your intelligent learning companion powered by quantum AI</p>
</div>

<div class="container">
  <div class="input-section">
    <div class="input-group">
      <div class="language-toggle">
        <span class="toggle-label">Response Language:</span>
        <div class="toggle-switch english" id="languageToggle">
          <button class="toggle-option active" onclick="setLanguage('english')" id="englishBtn">English</button>
          <button class="toggle-option" onclick="setLanguage('hinglish')" id="hinglishBtn">Hinglish</button>
        </div>
      </div>
      <label class="input-label">Ask Your Question</label>
      <textarea id="question" placeholder="Type your question here... Be as specific as possible for better answers" rows="4"></textarea>
      <div class="button-group">
        <button onclick="askAI()" id="askBtn">Send Question</button>
      </div>
    </div>
  </div>

  <div class="response-section" id="responseContainer">
    <div class="response-header">
      <span class="response-icon">✨</span>
      <span class="response-title">AI Response</span>
    </div>
    <div id="response"></div>
    <div style="margin-top: 25px; padding-top: 15px; border-top: 2px solid #f0f0f0; text-align: right;">
      <button onclick="newQuestion()" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">Ask New Question</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="script.js"></script>

</body>
</html>
