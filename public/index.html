<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="Quantum AI Teacher - An intelligent AI-powered teaching assistant that helps students learn with personalized responses and contextual understanding.">
  <meta name="keywords" content="AI Teacher, Quantum AI, Education, Learning Assistant">
  <meta name="author" content="Quantum AI Team">
  <meta name="theme-color" content="#6366f1">
  <title>Quantum AI Teacher</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 20px;
      overflow-x: hidden;
    }

    /* Header Section */
    .header {
      text-align: center;
      color: white;
      margin-bottom: 40px;
      margin-top: 40px;
      animation: fadeInDown 0.8s ease;
    }

    .header h1 {
      font-size: 3rem;
      font-weight: 700;
      margin-bottom: 10px;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
    }

    .header p {
      font-size: 1.1rem;
      font-weight: 300;
      opacity: 0.9;
    }

    /* Main Container */
    .container {
      width: 100%;
      max-width: 700px;
      animation: fadeInUp 0.8s ease;
    }

    /* Input Section */
    .input-section {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 40px;
      margin-bottom: 30px;
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
      border: 1px solid rgba(255, 255, 255, 0.18);
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .input-label {
      font-size: 0.95rem;
      font-weight: 600;
      color: #333;
      text-align: left;
    }

    textarea {
      font-family: 'Poppins', sans-serif;
      width: 100%;
      min-height: 130px;
      padding: 18px;
      font-size: 16px;
      border: 2px solid #e0e0e0;
      border-radius: 15px;
      outline: none;
      resize: vertical;
      transition: all 0.3s ease;
      background: #fafafa;
      color: #333;
    }

    textarea:focus {
      border-color: #667eea;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    textarea::placeholder {
      color: #999;
      font-weight: 400;
    }

    .button-group {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }

    button {
      font-family: 'Poppins', sans-serif;
      padding: 14px 32px;
      border: none;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-radius: 12px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
      position: relative;
      overflow: hidden;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
    }

    button:active {
      transform: translateY(0);
    }

    button.loading {
      opacity: 0.7;
      pointer-events: none;
    }

    /* Response Section */
    .response-section {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
      border: 1px solid rgba(255, 255, 255, 0.18);
      min-height: 150px;
      display: none;
      animation: fadeIn 0.5s ease;
    }

    .response-section.show {
      display: block;
    }

    .response-header {
      display: flex;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 2px solid #f0f0f0;
    }

    .response-icon {
      font-size: 24px;
      margin-right: 10px;
    }

    .response-title {
      font-size: 1rem;
      font-weight: 600;
      color: #667eea;
    }

    #response {
      font-size: 15px;
      line-height: 1.8;
      color: #333;
      word-wrap: break-word;
    }

    #response h1, #response h2, #response h3 {
      margin-top: 20px;
      margin-bottom: 10px;
      color: #667eea;
    }

    #response p {
      margin-bottom: 15px;
    }

    #response ul, #response ol {
      margin-left: 20px;
      margin-bottom: 15px;
    }

    #response li {
      margin-bottom: 8px;
    }

    #response code {
      background: #f5f5f5;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
      color: #667eea;
    }

    #response pre {
      background: #f5f5f5;
      padding: 15px;
      border-radius: 8px;
      overflow-x: auto;
      margin-bottom: 15px;
    }

    /* Animations */
    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    /* Responsive Design */
    @media (max-width: 600px) {
      .header h1 {
        font-size: 2rem;
      }

      .header p {
        font-size: 0.95rem;
      }

      .input-section,
      .response-section {
        padding: 25px;
      }

      textarea {
        min-height: 100px;
        font-size: 14px;
      }

      button {
        padding: 12px 24px;
        font-size: 14px;
      }

      .button-group {
        justify-content: center;
      }
    }

    /* Loading Spinner */
    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(102, 126, 234, 0.2);
      border-radius: 50%;
      border-top-color: #667eea;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>

<div class="header">
  <h1>🎓 Quantum AI Teacher</h1>
  <p>Your intelligent learning companion powered by quantum AI</p>
</div>

<div class="container">
  <div class="input-section">
    <div class="input-group">
      <label class="input-label">Ask Your Question</label>
      <textarea id="question" placeholder="Type your question here... Be as specific as possible for better answers" rows="4"></textarea>
      <div class="button-group">
        <button onclick="askAI()" id="askBtn">Send Question</button>
      </div>
    </div>
  </div>

  <div class="response-section" id="responseContainer">
    <div class="response-header">
      <span class="response-icon">✨</span>
      <span class="response-title">AI Response</span>
    </div>
    <div id="response"></div>
    <div style="margin-top: 25px; padding-top: 15px; border-top: 2px solid #f0f0f0; text-align: right;">
      <button onclick="newQuestion()" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">Ask New Question</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="script.js"></script>

</body>
</html>
