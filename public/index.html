<!DOCTYPE html>
<html lang="en">
<head>
  <title>Quantum AI Teacher</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #f5f7fb;
      margin: 0;
      padding: 20px;
      text-align: center;
    }

    h2 {
      font-weight: 600;
      color: #333;
    }

    textarea {
        font-family: 'Inter', sans-serif;
        width: 60%;
        min-height: 120px;
        padding: 15px;
        font-size: 15px;
        border-radius: 12px;
        border: 1px solid #ccc;
        outline: none;
        resize: vertical;
        transition: all 0.3s ease;
        box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }

    button {
      font-family: 'Inter', sans-serif;
      padding: 10px 20px;
      margin-left: 10px;
      border: none;
      background: #4a90e2;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    #response {
      font-family: 'Inter', sans-serif;
      width: 95%;
      margin: 20px auto;
      text-align: left;
      background: white;
      padding: 20px;
      border-radius: 12px;
      border: 1px solid #ddd;
      line-height: 1.6;
    }
  </style>
</head>
<body>

<h2>Quantum AI Teacher 🤖</h2>

<textarea id="question" placeholder="Ask your doubt" rows="4"></textarea><br /><br />
<button onclick="askAI()">Ask</button>

<p id="response"></p>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="script.js"></script>

</body>
</html>
